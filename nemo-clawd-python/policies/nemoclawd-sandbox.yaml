#
# Strict baseline policy for the Nemo Clawd sandbox.
# Principle: deny by default, allow only what's needed for core functionality.
# Dynamic updates (network_policies, inference) can be applied post-creation
# via `openshell policy set`. Static fields are effectively creation-locked.
#
# Policy tiers (future):
#   strict  — this file. Minimum for onboard + basic agent operation.
#   relaxed — adds third-party model providers, broader web access.
#
# To add endpoints: update this file and re-run `nemoclawd migrate`.
# or apply dynamically via `openshell policy set`.

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  claude_code:
    name: claude_code
    endpoints:
      - host: api.anthropic.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
      - host: statsig.anthropic.com
        port: 443
        rules:
          - allow: { method: "*", path: "/**" }
      - host: sentry.io
        port: 443
        rules:
          - allow: { method: "*", path: "/**" }
    binaries:
      - { path: /usr/local/bin/claude }

  nvidia:
    name: nvidia
    endpoints:
      - host: integrate.api.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
      - host: inference-api.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: "*", path: "/**" }
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/local/bin/nemoclawd }
      - { path: /usr/local/bin/nemo-clawd-mcp }

  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        access: full
      - host: api.github.com
        port: 443
        access: full
    binaries:
      - { path: /usr/bin/gh }
      - { path: /usr/bin/git }

  # ── Nemo Clawd "phone home" ────────────────────────────────────────────
  # Minimum viable set for Nemo Clawd to authenticate, discover plugins,
  # and reach ClawHub. Binary-restricted to the nemoclawd CLI only.
  # Docs access is read-only (GET). ClawHub and nemo-clawd.ai are
  # restricted to GET+POST (auth flows, plugin discovery).

  clawdhub:
    name: clawdhub
    endpoints:
      - host: clawdhub.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/nemoclawd }

  nemoclawd_api:
    name: nemoclawd_api
    endpoints:
      - host: nemo-clawd.ai
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/nemoclawd }

  nemoclawd_docs:
    name: nemoclawd_docs
    endpoints:
      - host: docs.nemo-clawd.ai
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/nemoclawd }

  # npm registry — needed for `nemoclawd plugins install` and `npm install`
  npm_registry:
    name: npm_registry
    endpoints:
      - host: registry.npmjs.org
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/nemoclawd }
      - { path: /usr/local/bin/npm }

  # ── Bundled clawd MCP tools ───────────────────────────────────
  xai_grok:
    name: xai_grok
    endpoints:
      - host: api.x.ai
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: POST, path: "/v1/chat/completions" }
          - allow: { method: POST, path: "/v1/images/generations" }
    binaries:
      - { path: /usr/local/bin/nemo-clawd-mcp }
      - { path: /usr/bin/node }

  helius_rpc:
    name: helius_rpc
    endpoints:
      - host: mainnet.helius-rpc.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/nemo-clawd-mcp }
      - { path: /usr/bin/node }

  birdeye_market_data:
    name: birdeye_market_data
    endpoints:
      - host: api.birdeye.so
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/nemo-clawd-mcp }
      - { path: /usr/bin/node }

  coingecko_market_data:
    name: coingecko_market_data
    endpoints:
      - host: api.coingecko.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/nemo-clawd-mcp }
      - { path: /usr/bin/node }

  # ── Messaging — pre-allowed for agent notifications ────────────
  # Telegram Bot API is open by default so the agent can send
  # notifications and respond to chats without triggering approval.
  telegram:
    name: telegram
    endpoints:
      - host: api.telegram.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/bot*/**" }
          - allow: { method: POST, path: "/bot*/**" }

  # ── Ollama (local inference) ───────────────────────────────────
  # Allow sandbox to reach Ollama on the host for DeepSolana / any
  # local model. Uses host.openshell.internal (Docker host alias).
  ollama:
    name: ollama
    endpoints:
      - host: host.openshell.internal
        port: 11434
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: "*", path: "/**" }
    binaries:
      - { path: /usr/local/bin/nemoclawd }
      - { path: /usr/local/bin/nemo-clawd-mcp }
      - { path: /usr/bin/curl }
