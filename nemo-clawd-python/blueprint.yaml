version: "0.1.0"
min_openshell_version: "0.1.0"
min_nemoclawd_version: "2026.3.0"
digest: ""  # Computed at release time

profiles:
  - default
  - ncp
  - nim-local
  - vllm

description: |
  Nemo Clawd blueprint: orchestrates a Hermes-derived Nemo Clawd sandbox,
  bundled MCP tooling, migration, and NIM/vLLM inference routing inside
  OpenShell.

components:
  agent:
    name: "nemo-clawd"
    base_agent: "hermes"
    manifest: "agents/nemo-clawd/manifest.yaml"

  sandbox:
    image: "ghcr.io/nvidia/nemoclaw/nemo-clawd:latest"
    name: "nemoclawd"
    forward_ports:
      - 18789
      - 8642

  mcp:
    name: "nemo-clawd"
    transport: "stdio"
    command: "/usr/local/bin/nemo-clawd-mcp"
    package_dir: "/opt/nemo-clawd-mcp"
    tool_count: 31

  operator:
    name: "clawd-operator"
    package_dir: "/opt/clawd-operator"
    command: "/usr/local/bin/clawd-operator"
    default_config: "/opt/clawd-operator/ralph.yml"
    codex_acp_config: "/opt/clawd-operator/ralph.codex-acp.yml"
    prompt_file: "/opt/clawd-operator/PROMPT.md"
    skills_dir: "/opt/clawd-operator/skills"
    clawd_agent_dir: "/opt/clawd-operator/clawd-agent"

  inference:
    profiles:
      default:
        provider_type: "nvidia"
        provider_name: "nvidia-inference"
        endpoint: "https://integrate.api.nvidia.com/v1"
        model: "nvidia/nemotron-3-super-120b-a12b"

      ncp:
        provider_type: "nvidia"
        provider_name: "nvidia-ncp"
        endpoint: ""
        model: "nvidia/nemotron-3-super-120b-a12b"
        credential_env: "NVIDIA_API_KEY"
        dynamic_endpoint: true

      nim-local:
        provider_type: "openai"
        provider_name: "nim-local"
        endpoint: "http://nim-service.local:8000/v1"
        model: "nvidia/nemotron-3-super-120b-a12b"
        credential_env: "NIM_API_KEY"

      vllm:
        provider_type: "openai"
        provider_name: "vllm-local"
        endpoint: "http://localhost:8000/v1"
        model: "nvidia/nemotron-3-nano-30b-a3b"
        credential_env: "OPENAI_API_KEY"
        credential_default: "dummy"

  policy:
    base: "policies/nemoclawd-sandbox.yaml"
    additions:
      nim_service:
        name: nim_service
        endpoints:
          - host: "nim-service.local"
            port: 8000
            protocol: rest
