version: "0.1.0"
min_openshell_version: "0.1.0"
min_nemoclawd_version: "2026.3.0"
digest: ""  # Computed at release time

profiles:
  - default
  - solana
  - openrouter
  - ncp
  - nim-local
  - vllm

description: |
  Nemo Clawd blueprint: orchestrates a Solana-native Nemo Clawd sandbox,
  migration, and routed inference inside OpenShell.

components:
  sandbox:
    image: "nemoclawd:latest"
    name: "nemoclawd"
    forward_ports:
      - 18789

  inference:
    profiles:
      default:
        provider_type: "nvidia"
        provider_name: "nvidia-inference"
        endpoint: "https://integrate.api.nvidia.com/v1"
        model: "nvidia/nemotron-3-super-120b-a12b"

      solana:
        provider_type: "openai"
        provider_name: "xai-grok"
        endpoint: "https://api.x.ai/v1"
        model: "grok-4.20-reasoning"
        credential_env: "XAI_API_KEY"

      openrouter:
        provider_type: "openai"
        provider_name: "openrouter"
        endpoint: "https://openrouter.ai/api/v1"
        model: "~openai/gpt-latest"
        credential_env: "OPENROUTER_API_KEY"

      ncp:
        provider_type: "nvidia"
        provider_name: "nvidia-ncp"
        endpoint: ""
        model: "nvidia/nemotron-3-super-120b-a12b"
        credential_env: "NVIDIA_API_KEY"
        dynamic_endpoint: true

      nim-local:
        provider_type: "openai"
        provider_name: "nim-local"
        endpoint: "http://nim-service.local:8000/v1"
        model: "nvidia/nemotron-3-super-120b-a12b"
        credential_env: "NIM_API_KEY"

      vllm:
        provider_type: "openai"
        provider_name: "vllm-local"
        endpoint: "http://localhost:8000/v1"
        model: "nvidia/nemotron-3-nano-30b-a3b"
        credential_env: "OPENAI_API_KEY"
        credential_default: "dummy"

  policy:
    base: "sandboxes/nemoclawd/policy.yaml"
    additions:
      nim_service:
        name: nim_service
        endpoints:
          - host: "nim-service.local"
            port: 8000
            protocol: rest
      xai:
        name: xai
        endpoints:
          - host: "api.x.ai"
            port: 443
            protocol: rest
            enforcement: enforce
            tls: terminate
            rules:
              - allow: { method: "*", path: "/**" }
      openrouter:
        name: openrouter
        endpoints:
          - host: "openrouter.ai"
            port: 443
            protocol: rest
            enforcement: enforce
            tls: terminate
            rules:
              - allow: { method: GET, path: "/api/v1/models" }
              - allow: { method: POST, path: "/api/v1/chat/completions" }
      solana_rpc:
        name: solana_rpc
        endpoints:
          - host: "api.mainnet-beta.solana.com"
            port: 443
            protocol: rest
            enforcement: enforce
            tls: terminate
            rules:
              - allow: { method: GET, path: "/**" }
              - allow: { method: POST, path: "/**" }
          - host: "rpc.solanatracker.io"
            port: 443
            protocol: rest
            enforcement: enforce
            tls: terminate
            rules:
              - allow: { method: GET, path: "/**" }
              - allow: { method: POST, path: "/**" }
          - host: "*.helius-rpc.com"
            port: 443
            protocol: rest
            enforcement: enforce
            tls: terminate
            rules:
              - allow: { method: GET, path: "/**" }
              - allow: { method: POST, path: "/**" }
