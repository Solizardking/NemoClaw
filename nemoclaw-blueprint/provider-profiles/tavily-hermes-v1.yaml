id: tavily-hermes-v1
display_name: Tavily Search for Hermes
description: Tavily Search API access for the Hermes managed Python runtime
category: agent
credentials:
  - name: api_key
    description: Tavily Search API key
    env_vars:
      - TAVILY_API_KEY
    required: true
    auth_style: bearer
    header_name: authorization
    query_param: ''
endpoints:
  - host: api.tavily.com
    port: 443
    protocol: rest
    access: read-write
    enforcement: enforce
binaries:
  - /opt/hermes/.venv/bin/python
  - /usr/local/bin/curl
  - /usr/bin/curl
inference_capable: false
