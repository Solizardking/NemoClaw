preset:
  name: tavily
  description: "Tavily web search API access (opt-in)"

network_policies:
  tavily:
    name: tavily
    endpoints:
      - host: api.tavily.com
        port: 443
        protocol: rest
        enforcement: enforce
        # Hermes sends the resolver placeholder as the JSON `api_key` field.
        request_body_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      # OpenShell attributes Tavily requests to each agent's managed Python
      # interpreter. Keep both paths exact so unrelated Python runtimes remain
      # outside the Tavily egress boundary.
      - { path: /opt/venv/bin/python3* }
      - { path: /opt/hermes/.venv/bin/python }
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
      - { path: /usr/local/bin/curl }
      - { path: /usr/bin/curl }
