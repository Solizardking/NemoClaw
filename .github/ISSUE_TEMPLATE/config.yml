blank_issues_enabled: false
contact_links:
  - name: Have a question?
    url: https://docs.nvidia.com/nemoclawd/latest/index.html
    about: >
      Start with the Nemo Clawd docs for setup questions, usage questions,
      design exploration, and ideas that are not ready for an issue.
  - name: Need troubleshooting help?
    url: https://docs.nvidia.com/nemoclawd/latest/get-started/quickstart.html
    about: >
      Check the quickstart and point your coding agent at the repo before
      opening a bug report.
  - name: Security vulnerability?
    url: https://docs.nvidia.com/nemoclawd/latest/index.html
    about: >
      Do not report security vulnerabilities through GitHub issues. Follow
      the disclosure process in SECURITY.md from the repository.
