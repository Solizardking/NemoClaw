#
# Verifies pinned installer SHA-256 hashes still match upstream scripts.
# Checked: Ollama installer and OpenShell v0.0.72 release assets.
# Reports the required check on every PR, verifies installer-affecting PRs, and
# performs the full network-backed drift check on every push to main and weekly.

name: Security / Installer Hash Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    # Weekly fallback in case upstream changes between PRs
    - cron: "30 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-hash:
    if: github.repository == 'NVIDIA/NemoClaw'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # The event base SHA can predate the synthetic merge ref's shallow
          # parents when main advances between PR events. Fetch full history so
          # the required check can compare the exact event SHAs fail-closed.
          fetch-depth: 0
          persist-credentials: false

      - name: Detect installer-affecting changes
        id: installer-changes
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git cat-file -e "${BASE_SHA}^{commit}"
          git cat-file -e "${HEAD_SHA}^{commit}"
          if git diff --quiet --no-ext-diff --no-renames "$BASE_SHA" "$HEAD_SHA" -- \
            .github/workflows/installer-hash-check.yaml \
            scripts/check-installer-hash.sh \
            scripts/install-openshell.sh \
            scripts/install.sh \
            test/installer-hash-check.test.ts; then
            installer_changed=false
          else
            diff_status=$?
            if [[ "$diff_status" -ne 1 ]]; then
              exit "$diff_status"
            fi
            installer_changed=true
          fi
          echo "installer=${installer_changed}" >>"$GITHUB_OUTPUT"

      - name: Verify installer hashes are current
        if: github.event_name != 'pull_request' || steps.installer-changes.outputs.installer == 'true'
        run: bash scripts/check-installer-hash.sh
