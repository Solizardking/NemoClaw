<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAWD Swap - Jupiter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', monospace;
            background: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .swap-container {
            background: rgba(18, 18, 26, 0.95);
            border: 1px solid rgba(42, 42, 53, 0.8);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #06b6d4, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.875rem;
            color: #a1a1aa;
        }

        #jupiter-terminal {
            border-radius: 16px;
            overflow: hidden;
        }

        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: #71717a;
        }

        .close-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
        }
    </style>
</head>
<body>
    <button class="close-btn" onclick="window.close()">✕ Close</button>

    <div class="swap-container">
        <div class="header">
            <div class="logo">🦞</div>
            <div class="title">CLAWD Swap</div>
            <div class="subtitle">Powered by Jupiter</div>
        </div>

        <div id="jupiter-terminal"></div>

        <div class="footer">
            🦞 Exfoliate, trade, launch, vibe! • Powered by Jupiter
        </div>
    </div>

    <!-- Jupiter Terminal Script -->
    <script src="https://terminal.jup.ag/main-v2.js"></script>
    <script>
        // Read target token from URL ?token=MINT and optional quote mint ?quote=MINT
        let _currentOutputMint = new URLSearchParams(window.location.search).get('token') || undefined;
        let _currentInputMint = new URLSearchParams(window.location.search).get('quote') || undefined;

        function initJupiter(outputMint, inputMint) {
            window.Jupiter.init({
                displayMode: "integrated",
                integratedTargetId: "jupiter-terminal",
                endpoint: window.CLAWD_RPC_URL || "https://api.mainnet-beta.solana.com",
                platformFeeAndAccounts: window.CLAWD_REFERRAL_ACCOUNT ? {
                    referralAccount: window.CLAWD_REFERRAL_ACCOUNT,
                    feeBps: 50
                } : undefined,
                defaultExplorer: "Solscan",
                strictTokenList: false,
                formProps: {
                    fixedOutputMint: false,
                    swapMode: "ExactIn",
                    initialAmount: "",
                    initialInputMint: inputMint || "So11111111111111111111111111111111111111112",
                    initialOutputMint: outputMint,
                },
                onSuccess: ({ txid, swapResult }) => {
                    console.log('Swap successful:', txid);
                    showNotification('✅ Swap successful!', `Transaction: ${txid.slice(0, 8)}...`, 'success');
                },
                onSwapError: ({ error }) => {
                    console.error('Swap error:', error);
                    showNotification('❌ Swap failed', error.message || 'Unknown error', 'error');
                },
            });
        }

        initJupiter(_currentOutputMint, _currentInputMint);

        function showNotification(title, message, type) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 5rem;
                right: 1rem;
                background: ${type === 'success' ? 'rgba(34, 197, 94, 0.1)' : 'rgba(239, 68, 68, 0.1)'};
                border: 1px solid ${type === 'success' ? 'rgba(34, 197, 94, 0.3)' : 'rgba(239, 68, 68, 0.3)'};
                color: ${type === 'success' ? '#22c55e' : '#ef4444'};
                padding: 1rem;
                border-radius: 8px;
                font-size: 0.875rem;
                max-width: 300px;
                animation: slideIn 0.3s ease;
                z-index: 9999;
            `;
            notification.innerHTML = `
                <div style="font-weight: 600; margin-bottom: 0.25rem;">${title}</div>
                <div style="color: #a1a1aa; font-size: 0.75rem;">${message}</div>
            `;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 5000);
        }

        // Listen for config or token from parent window
        window.addEventListener('message', (event) => {
            if (event.data.type === 'CLAWD_CONFIG') {
                window.CLAWD_RPC_URL = event.data.rpcUrl;
                window.CLAWD_REFERRAL_ACCOUNT = event.data.referralAccount;
            }
            if (event.data.type === 'CLAWD_TOKEN' && event.data.mint) {
                _currentOutputMint = event.data.mint;
                // Re-init Jupiter with the new output mint
                document.getElementById('jupiter-terminal').innerHTML = '';
                initJupiter(_currentOutputMint, _currentInputMint);
            }
            if (event.data.type === 'CLAWD_QUOTE_TOKEN' && event.data.mint) {
                _currentInputMint = event.data.mint;
                document.getElementById('jupiter-terminal').innerHTML = '';
                initJupiter(_currentOutputMint, _currentInputMint);
            }
        });
    </script>

    <style>
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }
    </style>
</body>
</html>
