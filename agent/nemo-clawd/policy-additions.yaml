# Network additions for the Hermes-derived Nemo Clawd image.

network_policies:
  xai_grok:
    name: xai_grok
    endpoints:
      - host: api.x.ai
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: POST, path: "/v1/chat/completions" }
          - allow: { method: POST, path: "/v1/images/generations" }
    binaries:
      - { path: /usr/local/bin/nemo-clawd-mcp }
      - { path: /usr/bin/node }

  helius_rpc:
    name: helius_rpc
    endpoints:
      - host: mainnet.helius-rpc.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: POST, path: "/**" }
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/nemo-clawd-mcp }
      - { path: /usr/bin/node }

  birdeye_market_data:
    name: birdeye_market_data
    endpoints:
      - host: api.birdeye.so
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/nemo-clawd-mcp }
      - { path: /usr/bin/node }

  coingecko_market_data:
    name: coingecko_market_data
    endpoints:
      - host: api.coingecko.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/nemo-clawd-mcp }
      - { path: /usr/bin/node }

  telegram_notifications:
    name: telegram_notifications
    endpoints:
      - host: api.telegram.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/bot*/**" }
          - allow: { method: POST, path: "/bot*/**" }
    binaries:
      - { path: /usr/local/bin/nemo-clawd-mcp }
      - { path: /usr/bin/node }
